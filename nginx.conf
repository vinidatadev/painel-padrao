server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cache longo para assets com hash no nome (js, css, imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://learn.microsoft.com; connect-src 'self' https://login.microsoftonline.com https://backend.devlopplay.site;";

    # Redireciona tudo pro index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
